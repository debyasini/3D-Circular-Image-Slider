<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-D Image slider</title>
    <link rel="stylesheet" href="slider.css">
</head>
<body>
    <div class="sheet">
        <div class="slider" style="--quantity: 8">
            <div class="items" style="--position: 1"><img src="img1.jpg" alt="image1"></div>
            <div class="items" style="--position: 2"><img src="img2.jpg" alt="image2"></div>
            <div class="items" style="--position: 3"><img src="img3.jpg" alt="image3"></div>
            <div class="items" style="--position: 4"><img src="img4.jpg" alt="image4"></div>
            <div class="items" style="--position: 5"><img src="img5.jpg" alt="image5"></div>
            <div class="items" style="--position: 6"><img src="img6.jpg" alt="image6"></div>
            <div class="items" style="--position: 7"><img src="img7.jpg" alt="image7"></div>
            <div class="items" style="--position: 8"><img src="img8.jpg" alt="image8"></div>
        </div>
        <div class="content">
            <h1>SAVE ENVIRONMENT</h1>
            <div class="tree"></div>
        </div>
        
    </div>
    
</body>
</html>
